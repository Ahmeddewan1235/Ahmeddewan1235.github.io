<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Dewan | IT Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        :root {
            --teal: #0d9488;
            --teal-light: #99f6e4;
            --teal-dark: #0f766e;
            --navy: #0f172a;
            --grey: #64748b;
            --light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }
 
        html {
            scroll-behavior: smooth;
        }
 
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--light);
            color: var(--navy);
            overflow-x: hidden;
        }
 
        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(248, 250, 252, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }
 
        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--teal);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
 
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
 
        nav ul li a {
            text-decoration: none;
            color: var(--grey);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s ease;
            position: relative;
        }
 
        nav ul li a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--teal);
            transition: width 0.3s ease;
        }
 
        nav ul li a:hover {
            color: var(--teal);
        }
 
        nav ul li a:hover::after {
            width: 100%;
        }
 
        /* ── HERO ── */
        #home {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 6rem 2rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
 
        .hero-content {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.8s ease forwards 0.2s;
        }
 
        .hero-tag {
            display: inline-block;
            background: var(--teal-light);
            color: var(--teal-dark);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.3rem 0.9rem;
            border-radius: 999px;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
 
        .hero-name {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.8rem, 7vw, 5rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -2px;
            color: var(--navy);
            margin-bottom: 1rem;
        }
 
        .hero-name span {
            color: var(--teal);
        }
 
        .hero-sub {
            font-size: 1.1rem;
            color: var(--grey);
            max-width: 520px;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
 
        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
 
        .btn-primary {
            background: var(--teal);
            color: white;
            padding: 0.75rem 1.75rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: background 0.2s ease, transform 0.2s ease;
        }
 
        .btn-primary:hover {
            background: var(--teal-dark);
            transform: translateY(-2px);
        }
 
        .btn-secondary {
            border: 1.5px solid var(--border);
            color: var(--navy);
            padding: 0.75rem 1.75rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
 
        .btn-secondary:hover {
            border-color: var(--teal);
            color: var(--teal);
            transform: translateY(-2px);
        }
 
        /* ── SECTIONS SHARED ── */
        section {
            padding: 6rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
 
        .section-label {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--teal);
            margin-bottom: 0.75rem;
        }
 
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--navy);
            margin-bottom: 3rem;
        }
 
        /* ── SKILLS ── */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
 
        .skill-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
 
        .skill-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(13, 148, 136, 0.1);
            border-color: var(--teal-light);
        }
 
        .skill-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--navy);
        }
 
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
 
        .tag {
            background: var(--light);
            border: 1px solid var(--border);
            color: var(--grey);
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
        }
 
        /* ── PROJECTS ── */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
 
        .project-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.75rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            overflow: hidden;
        }
 
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--teal);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
 
        .project-card:hover::before {
            transform: scaleX(1);
        }
 
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(13, 148, 136, 0.1);
        }
 
        .project-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.5rem;
        }
 
        .project-card p {
            color: var(--grey);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
 
        .project-status {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 999px;
            background: var(--teal-light);
            color: var(--teal-dark);
        }
 
        /* ── CONTACT ── */
        .contact-box {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }
 
        .contact-box p {
            color: var(--grey);
            margin-bottom: 2rem;
            line-height: 1.7;
        }
 
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
 
        /* ── CHATBOT ── */
        .chatbot-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            background: var(--teal);
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(13, 148, 136, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 999;
            border: none;
        }
 
        .chatbot-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(13, 148, 136, 0.5);
        }
 
        .chatbot-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
 
        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
 
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
 
        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            nav ul {
                gap: 1rem;
            }
            .hero-buttons {
                flex-direction: column;
            }
            .contact-box {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
